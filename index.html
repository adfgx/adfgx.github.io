<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: rgb(235, 116, 116);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    /* Container for buttons at the top */
    #button-container {
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 10px;
      position: absolute;
      top: 0;
    }
    /* Style for buttons */
    #start-btn, #second-btn, #third-btn {
      font-size: 24px;
      padding: 10px 20px;
      margin: 0 10px;
      cursor: pointer;
    }
    /* Centered word display */
    #demo {
      font-size: 10vw; /* Responsive font size based on viewport width */
      color: black;
      font-family: Arial;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      margin-top: 100px; /* Space below buttons */
    }
    /* Timer display */
    #timer {
      font-size: 4vw;
      color: black;
      font-family: Arial;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <!-- Button container at the top -->
  <div id="button-container">
    <button id="start-btn">Basic 4 Strikes</button>
    <button id="second-btn">Striking & Takedowns</button>
    <button id="third-btn">longer striking & takedowns</button>
  </div>

  <!-- Centered word display -->
  <div id="demo"></div>
  
  <!-- Timer display -->
  <div id="timer"></div>

  <!-- Audio elements for Basic 4 Strikes -->
  <audio id="kick-sound" src="kick.mp3"></audio>
  <audio id="jab-sound" src="jab.mp3"></audio>
  <audio id="cross-sound" src="cross.mp3"></audio>
  <audio id="hook-sound" src="hook.mp3"></audio>

  <!-- Audio elements for Striking & Takedowns -->
  <audio id="blt-sound" src="blt.mp3"></audio>
  <audio id="ht-sound" src="ht.mp3"></audio>
  <audio id="sprawl-sound" src="sprawl.mp3"></audio>

  <!-- Audio elements for Sample -->
  <audio id="sample-sound" src="kick.mp3"></audio>
  <audio id="samplee-sound" src="jab.mp3"></audio>
  <audio id="sampleee-sound" src="cross.mp3"></audio>
  <audio id="sampleeee-sound" src="hook.mp3"></audio>

  <!-- JavaScript -->
  <script>
    const demoElement = document.querySelector('#demo');
    const timerElement = document.querySelector('#timer');
    const startBtn = document.querySelector('#start-btn');
    const secondBtn = document.querySelector('#second-btn');
    const thirdBtn = document.querySelector('#third-btn');

    let loopTimeoutId; // Loop timeout ID
    let endTimeoutId; // End timeout ID to stop the loop after 90 seconds
    let countdownIntervalId; // Interval ID for the countdown timer
    let remainingTime; // Remaining time in seconds

    // Function to start the countdown timer
    function startTimer(duration) {
      remainingTime = duration;
      updateTimerDisplay(remainingTime);
      
      countdownIntervalId = setInterval(() => {
        remainingTime--;
        if (remainingTime <= 0) {
          clearInterval(countdownIntervalId);
          timerElement.textContent = '';
        } else {
          updateTimerDisplay(remainingTime);
        }
      }, 1000);
    }

    // Function to update the timer display
    function updateTimerDisplay(time) {
      const minutes = Math.floor(time / 60);
      const seconds = time % 60;
      timerElement.textContent = `Time Remaining: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    // Function to stop the countdown timer
    function stopTimer() {
      clearInterval(countdownIntervalId);
      timerElement.textContent = '';
    }

    // Function for Basic 4 Strikes
    function logBasic() {
      const basicWords = ['kick', 'jab', 'cross', 'hook'];
      let copy = [...basicWords];

      function loop() {
        const rnd = Math.floor(Math.random() * copy.length);
        const word = copy.splice(rnd, 1)[0];
        demoElement.textContent = word;

        const audio = document.getElementById(`${word}-sound`);
        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }

        // Set custom delays for specific words
        const delay = (word === 'kick') ? 2000 : 1000;

        if (!copy.length) copy = [...basicWords];
        loopTimeoutId = setTimeout(loop, delay);
      }

      loop();

      // Set a timeout to stop the loop after 90 seconds
      endTimeoutId = setTimeout(() => {
        clearTimeout(loopTimeoutId);
        demoElement.textContent = ''; // Clear the word display
        stopTimer(); // Stop the countdown
      }, 90000); // 90,000 ms = 90 seconds

      // Start the countdown timer
      startTimer(90);
    }

    // Function for Striking & Takedowns
    function logAdvanced() {
      const advancedWords = ['hook', 'kick', 'jab', 'cross', 'blt', 'ht', 'sprawl'];
      let copy = [...advancedWords];

      function loop() {
        const rnd = Math.floor(Math.random() * copy.length);
        const word = copy.splice(rnd, 1)[0];
        demoElement.textContent = word;

        const audio = document.getElementById(`${word}-sound`);
        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }

        // Set custom delays for specific words
        const delay = (word === 'kick' || word === 'sprawl' || word === 'blt' || word === 'ht') ? 2000 : 1000;

        if (!copy.length) copy = [...advancedWords];
        loopTimeoutId = setTimeout(loop, delay);
      }

      loop();

      // Set a timeout to stop the loop after 90 seconds
      endTimeoutId = setTimeout(() => {
        clearTimeout(loopTimeoutId);
        demoElement.textContent = ''; // Clear the word display
        stopTimer(); // Stop the countdown
      }, 90000); // 90,000 ms = 90 seconds

      // Start the countdown timer
      startTimer(90);
    }

    // Function for Sample
    function logSample() {
      const thirdWords = ['hook', 'kick', 'jab', 'cross', 'blt', 'ht', 'sprawl'];
      let copy = [...thirdWords];

      function loop() {
        const rnd = Math.floor(Math.random() * copy.length);
        const word = copy.splice(rnd, 1)[0];
        demoElement.textContent = word;

        const audio = document.getElementById(`${word}-sound`);
        if (audio) {
          audio.currentTime = 0;
          audio.play();
        }

        // Set custom delays for specific words
        const delay = (word === 'kick' || word === 'sprawl' || word === 'blt' || word === 'ht') ? 3000 : 1000;

        if (!copy.length) copy = [...thirdWords];
        loopTimeoutId = setTimeout(loop, delay);
      }

      loop();

      // Set a timeout to stop the loop after 90 seconds
      endTimeoutId = setTimeout(() => {
        clearTimeout(loopTimeoutId);
        demoElement.textContent = ''; // Clear the word display
        stopTimer(); // Stop the countdown
      }, 90000); // 90,000 ms = 90 seconds

      // Start the countdown timer
      startTimer(90);
    }

    // Event listeners for buttons
    startBtn.addEventListener('click', () => {
      clearTimeout(loopTimeoutId); // Stop the current function
      clearTimeout(endTimeoutId); // Clear any previous end timeout
      stopTimer(); // Clear any existing timer
      logBasic(); // Start the Basic 4 Strikes function
    });

    secondBtn.addEventListener('click', () => {
      clearTimeout(loopTimeoutId);
      clearTimeout(endTimeoutId);
      stopTimer();
      logAdvanced(); // Start the Striking & Takedowns function
    });

    thirdBtn.addEventListener('click', () => {
      clearTimeout(loopTimeoutId);
      clearTimeout(endTimeoutId);
      stopTimer();
      logSample(); // Start the Sample function
    });

  </script>
</body>
</html>
